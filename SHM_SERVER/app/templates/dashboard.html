<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structural Health Monitoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f8fafc; }
        .pill { font-size: .7rem; font-weight: 600; padding: .15rem .55rem; border-radius: 9999px; letter-spacing: .02em; }
        .st-ok       { color:#047857; background:#ecfdf5; border:1px solid #a7f3d0; }
        .st-warning  { color:#b45309; background:#fffbeb; border:1px solid #fde68a; }
        .st-critical { color:#b91c1c; background:#fef2f2; border:1px solid #fecaca; }
        .dot { width:.6rem; height:.6rem; border-radius:9999px; display:inline-block; }
        .d-ok{background:#10b981;} .d-warning{background:#f59e0b;} .d-critical{background:#ef4444;}
        .accent-ok       { border-left:5px solid #10b981; }
        .accent-warning  { border-left:5px solid #f59e0b; }
        .accent-critical { border-left:5px solid #ef4444; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }
        .live { animation: pulse 1.8s ease-in-out infinite; }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-slate-900 text-white w-9 h-9 rounded-lg flex items-center justify-center font-bold">SHM</div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Structural Health Monitoring</h1>
                    <p class="text-xs text-slate-500" id="device-name">—</p>
                </div>
            </div>
            <div class="text-right text-xs text-slate-500">
                <div class="flex items-center justify-end gap-1.5">
                    <span class="dot d-ok live" id="live-dot"></span>
                    <span id="conn-status">Live</span>
                </div>
                <div>Updated <span id="last-update">—</span></div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 space-y-8">

        <!-- Overall health banner -->
        <section id="health-card" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex items-center gap-6 accent-ok">
            <div class="relative w-28 h-28 flex-shrink-0">
                <svg viewBox="0 0 120 120" class="w-28 h-28 -rotate-90">
                    <circle cx="60" cy="60" r="52" fill="none" stroke="#e2e8f0" stroke-width="12"/>
                    <circle id="health-ring" cx="60" cy="60" r="52" fill="none" stroke="#10b981" stroke-width="12"
                            stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span class="text-3xl font-bold" id="health-score">—</span>
                    <span class="text-[10px] uppercase tracking-wide text-slate-400">/ 100</span>
                </div>
            </div>
            <div class="flex-1">
                <p class="text-xs uppercase tracking-wide text-slate-400 mb-1">Structure Status</p>
                <p class="text-3xl font-bold" id="health-label">—</p>
                <p class="text-sm text-slate-500 mt-1" id="health-sub">Waiting for data…</p>
            </div>
            <div class="text-center px-5 py-3 rounded-lg bg-slate-50 border border-slate-200">
                <p class="text-3xl font-bold" id="active-alerts-count">0</p>
                <p class="text-xs text-slate-500 mt-1">Active alerts</p>
            </div>
        </section>

        <!-- Structural elements -->
        <section>
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-3">Structural Elements</h2>
            <div id="elements-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <!-- Environment -->
        <section>
            <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide mb-3">Environment &amp; Dynamics</h2>
            <div id="env-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </section>

        <!-- Trends -->
        <section>
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Trends</h2>
                <div class="flex gap-1" id="range-buttons">
                    <button class="range-btn px-3 py-1 text-xs rounded-md border border-slate-200 bg-white" data-hours="1">1h</button>
                    <button class="range-btn px-3 py-1 text-xs rounded-md border border-slate-200 bg-white" data-hours="6">6h</button>
                    <button class="range-btn px-3 py-1 text-xs rounded-md border border-slate-900 bg-slate-900 text-white" data-hours="24">24h</button>
                    <button class="range-btn px-3 py-1 text-xs rounded-md border border-slate-200 bg-white" data-hours="168">7d</button>
                </div>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                    <h3 class="text-sm font-semibold mb-3">Strain by element <span class="text-xs font-normal text-slate-400">(μm/m)</span></h3>
                    <div style="position:relative;height:280px;"><canvas id="strainChart"></canvas></div>
                </div>
                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4">
                    <h3 class="text-sm font-semibold mb-3">Temperature &amp; Humidity</h3>
                    <div style="position:relative;height:280px;"><canvas id="envChart"></canvas></div>
                </div>
            </div>
        </section>

        <!-- Alerts -->
        <section class="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">Alerts &amp; Events</h2>
                <div class="flex gap-1">
                    <button id="alerts-active-btn" class="px-3 py-1 text-xs rounded-md border border-slate-900 bg-slate-900 text-white">Active</button>
                    <button id="alerts-all-btn" class="px-3 py-1 text-xs rounded-md border border-slate-200 bg-white">History</button>
                </div>
            </div>
            <div id="alerts-list" class="space-y-2"></div>
        </section>
    </main>

    <footer class="max-w-7xl mx-auto px-6 py-6 text-center text-xs text-slate-400">
        Structural Health Monitoring System
    </footer>

    <script>
        window.__DEVICE__     = {{ device|tojson }};
        window.__ELEMENTS__   = {{ elements|tojson }};
        window.__THRESHOLDS__ = {{ thresholds|tojson }};
    </script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
